name: Build and Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION | tr -d ' \n')" >> "$GITHUB_OUTPUT"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build (release)
        run: cargo build --release --locked

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/glowdiary dist/
          cp README.md dist/ 2>/dev/null || true
          cd dist
          tar czf ../glowdiary-x86_64-unknown-linux-gnu.tar.gz glowdiary
          ls -lh ../glowdiary-x86_64-unknown-linux-gnu.tar.gz

      - name: Upload binary as CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: glowdiary-x86_64-unknown-linux-gnu
          path: dist/glowdiary
          retention-days: 7

      - name: Create or update continuous release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: "Continuous Build (v${{ steps.version.outputs.VERSION }})"
          body: |
            Auto-built from commit `${{ github.sha }}` on `${{ github.ref_name }}`.

            **Version:** v${{ steps.version.outputs.VERSION }}

            ## Usage in Docker

            Pin to a specific version:
            ```dockerfile
            ADD https://github.com/${{ github.repository }}/releases/download/continuous/glowdiary-x86_64-unknown-linux-gnu.tar.gz /tmp/
            RUN tar xzf /tmp/glowdiary-x86_64-unknown-linux-gnu.tar.gz -C /usr/local/bin/ && \
                chmod +x /usr/local/bin/glowdiary
            ```

            Or download a specific version from [Releases](https://github.com/${{ github.repository }}/releases).

            ## `--db-path` / data persistence

            Mount a volume to persist the SQLite database:
            ```dockerfile
            VOLUME /data
            ```
            Run with: `glowdiary --db-path /data/glowdiary.db`
          files: |
            glowdiary-x86_64-unknown-linux-gnu.tar.gz
          make_latest: true
          fail_on_unmatched_files: true
